name: reusable workflow
on: 
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: 'lts/*'
# my job

jobs:
  run-npm-test:
    runs-on: ubuntu-latest
    steps:
        - name: checkout
          uses: actions/checkout@v6
        - name : setup node
          uses: actions/setup-node@v6
          with:
            node-version: ${{ inputs.node-version }}
        - name: run test
          shell: bash
          run: |
            node -v
            npm install
