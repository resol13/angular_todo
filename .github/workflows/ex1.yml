name: npm test
on: 
  push:
    branches: [ "main" ]
#  pull_request:
#    branches: [ "main" ]
  workflow_dispatch:
               
jobs:
  install:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Setup node@v6
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: install
        run: npm install
    

  test:
    runs-on: ubuntu-latest
    needs: install
    steps: 
        - name: checkout
          uses: actions/checkout@v6
        - name : setup node
          uses: actions/setup-node@v6
          with:
            node-version: 'lts/*'
        - name: run test
          shell: bash
          run: |
            npm install
            npm test
  
  sonar:
   runs-on: ubuntu-latest
   steps:
     - name: list file
       run:  ls
